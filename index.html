<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
<title>Habit Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f2f2f7;color:#111;font-size:15px;min-height:100%;padding-bottom:env(safe-area-inset-bottom,20px);}
@media(prefers-color-scheme:dark){
  body{background:#1c1c1e;color:#f0f0f0;}
  .card,.stat,.popup-box{background:#2c2c2e!important;}
  .save-bar{background:#2c2c2e!important;border-color:#3a3a3c!important;}
  input,select{background:#3a3a3c!important;color:#f0f0f0!important;border-color:#545456!important;}
  .tab{border-color:#545456!important;color:#8e8e93!important;}
  .tab.on{background:#f0f0f0!important;color:#111!important;border-color:#f0f0f0!important;}
  .xbtn,.arr{background:#2c2c2e!important;color:#f0f0f0!important;border-color:#545456!important;}
  .sbtn{background:#3a3a3c!important;color:#f0f0f0!important;border-color:#545456!important;}
  .btn{background:#3a3a3c!important;color:#f0f0f0!important;border-color:#545456!important;}
  .btnp{background:#f0f0f0!important;color:#111!important;border-color:#f0f0f0!important;}
  .hrow{border-color:#3a3a3c!important;}
  .tlbl{background:#3a3a3c!important;color:#8e8e93!important;}
  .addsec,.hmgr{border-color:#3a3a3c!important;}
  .panel-sep{border-color:#3a3a3c!important;}
  .pbg{background:#3a3a3c!important;}
  .popup-box{box-shadow:0 20px 60px rgba(0,0,0,.6)!important;}
}
.page{max-width:680px;margin:0 auto;padding:0 16px;}

/* save bar */
.save-bar{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #e5e5ea;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.save-msg{font-size:12px;color:#ff6b00;flex:1;min-width:120px;font-weight:500;}
.save-msg.ok{color:#34c759;}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 12px;}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.ynav{display:flex;align-items:center;gap:4px;}
.ynav span{font-size:13px;color:#8e8e93;min-width:36px;text-align:center;}
.xbtn{width:32px;height:32px;border-radius:50%;border:1px solid #d1d1d6;background:#fff;color:#111;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.xbtn:active{background:#e5e5ea;}

/* tabs */
.tabs-row{display:flex;align-items:center;gap:5px;margin-bottom:12px;}
.arr{width:32px;height:32px;border-radius:50%;border:1px solid #d1d1d6;background:#fff;color:#111;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.arr:active{background:#e5e5ea;}
.tabs-scroll{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs-scroll::-webkit-scrollbar{display:none;}
.tabs-inner{display:inline-flex;gap:6px;padding:2px 0 4px;}
.tab{display:inline-block;padding:6px 14px;border-radius:16px;font-size:13px;border:1px solid #d1d1d6;background:transparent;color:#8e8e93;white-space:nowrap;cursor:pointer;}
.tab.on{background:#111;color:#fff;border-color:#111;}

/* badge */
.badge{font-size:11px;color:#8e8e93;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.bdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* stats */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
@media(min-width:460px){.stats{grid-template-columns:repeat(4,1fr);}}
.stat{background:#fff;border-radius:12px;padding:12px 14px;}
.slbl{font-size:10px;color:#8e8e93;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.sval{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.ssub{font-size:10px;color:#8e8e93;margin-top:2px;}

/* grid */
.gsec{margin-bottom:14px;}
.gscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.gscroll::-webkit-scrollbar{display:none;}
.ginner{display:inline-block;min-width:750px;}
.grid-col{display:flex;flex-direction:column;overflow:visible;}
.mrow{position:relative;height:12px;margin-bottom:3px;width:689px;min-width:689px;overflow:visible;}
.mlbl{position:absolute;font-size:9px;color:#8e8e93;}
.gouter{display:flex;gap:3px;}
.dcol{width:22px;flex-shrink:0;}
.dsp{height:15px;}
.dlbl{height:11px;line-height:11px;font-size:9px;color:#8e8e93;text-align:right;padding-right:3px;}
.dgap{height:2px;}
.grid{display:grid;grid-template-columns:repeat(53,11px);grid-template-rows:repeat(7,11px);grid-auto-flow:column;gap:2px;flex-shrink:0;}
.cell{width:11px;height:11px;border-radius:2px;cursor:pointer;background:#e5e5ea;}
.cell:active{opacity:.6;}
.legend{display:flex;align-items:center;gap:4px;margin-top:6px;justify-content:flex-end;}
.llbl{font-size:10px;color:#8e8e93;}
.lcell{width:10px;height:10px;border-radius:2px;}

/* card / panel */
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;}
.card h3{font-size:15px;font-weight:600;margin-bottom:14px;}
.flbl{font-size:11px;color:#6d6d72;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.frow{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
@media(min-width:460px){.frow{flex-direction:row;}.frow>*{flex:1;}}
input,select{height:46px;padding:0 12px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;color:#111;font-size:16px;width:100%;-webkit-appearance:none;appearance:none;}
input:focus,select:focus{outline:2px solid #34c759;border-color:transparent;}

/* scale */
.srow{display:flex;gap:8px;}
.sbtn{flex:1;height:54px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;color:#111;font-size:22px;font-weight:700;cursor:pointer;}
.sbtn:active{opacity:.7;}
.sbtn.on{color:#fff!important;border-color:transparent!important;}

/* buttons */
.btn{height:46px;padding:0 18px;border-radius:10px;border:1px solid #d1d1d6;background:#fff;color:#111;font-size:15px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;}
.btn:active{opacity:.7;}
.btnp{background:#111!important;color:#fff!important;border-color:#111!important;}
.btnw{width:100%;}
.btnsm{height:34px;font-size:12px;padding:0 12px;}
.gap{height:10px;}
.panel-sep{border:none;border-top:1px solid #e5e5ea;margin:12px 0;}

/* manage */
.mtog{font-size:13px;color:#8e8e93;text-decoration:underline;text-underline-offset:2px;background:none;border:none;padding:4px 0;margin-top:10px;cursor:pointer;display:inline-block;}
.hmgr{display:none;margin-top:12px;padding-top:12px;border-top:1px solid #e5e5ea;}
.hmgr.open{display:block;}
.hrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #e5e5ea;}
.hrow:last-of-type{border-bottom:none;}
.hname{flex:1;font-size:14px;}
.tlbl{font-size:10px;color:#8e8e93;padding:2px 7px;border-radius:8px;background:#f2f2f7;white-space:nowrap;}
.bdel{height:30px;padding:0 10px;font-size:12px;border:1px solid #d1d1d6;border-radius:8px;background:transparent;cursor:pointer;color:#8e8e93;}
.addsec{margin-top:12px;padding-top:12px;border-top:1px solid #e5e5ea;}
.arow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.arow input,.arow select{height:42px;font-size:14px;flex:1;min-width:100px;}

/* popup */
.poverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.poverlay.open{display:flex;}
.popup-box{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.pd{font-size:11px;color:#8e8e93;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.ph{font-size:15px;font-weight:600;margin-bottom:14px;}
.pnum{font-size:56px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:2px;}
.punit{font-size:13px;color:#8e8e93;margin-bottom:4px;}
.ppct{font-size:13px;color:#6d6d72;margin-bottom:14px;}
.pbg{background:#e5e5ea;border-radius:5px;height:7px;margin-bottom:16px;overflow:hidden;}
.pbf{height:100%;border-radius:5px;transition:width .35s;}
.pacts{display:flex;gap:8px;}
.pacts .btn{flex:1;height:42px;font-size:14px;}

/* toast */
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(8px);background:#111;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;max-width:88vw;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- SAVE BAR -->
<div class="save-bar">
  <span class="save-msg" id="smsg">Tap "Save" after logging to keep your data</span>
  <button class="btn btnsm btnp" onclick="doSave()">&#128190; Save</button>
  <button class="btn btnsm" onclick="doExport()">&#8595; Export</button>
  <button class="btn btnsm" onclick="document.getElementById('ifile').click()">&#8593; Import</button>
  <input type="file" id="ifile" accept=".json" style="display:none" onchange="doImport(event)">
</div>

<div class="page">
  <div class="hdr">
    <h1>Habits</h1>
    <div class="ynav">
      <button class="xbtn" onclick="changeYear(-1)">&#8249;</button>
      <span id="yd">2026</span>
      <button class="xbtn" onclick="changeYear(1)">&#8250;</button>
    </div>
  </div>

  <div class="tabs-row">
    <button class="arr" onclick="shiftTabs(-1)">&#8249;</button>
    <div class="tabs-scroll" id="tscroll"><div class="tabs-inner" id="tabs"></div></div>
    <button class="arr" onclick="shiftTabs(1)">&#8250;</button>
  </div>

  <div class="badge" id="badge"></div>
  <div class="stats" id="stats"></div>

  <div class="gsec">
    <div class="gscroll"><div class="ginner">
      <div class="gouter">
        <div class="dcol" id="dcol"></div>
        <div class="grid-col">
          <div class="mrow" id="mrow"></div>
          <div class="grid" id="grid"></div>
        </div>
      </div>
    </div></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="card">
    <h3>Log entry</h3>
    <div class="frow">
      <div><div class="flbl">Date</div><input type="date" id="ldate"></div>
      <div><div class="flbl">Habit</div><select id="lhabit" onchange="onSel()"></select></div>
    </div>
    <div id="linput"></div>
    <div class="gap"></div>
    <button class="btn btnp btnw" onclick="doLog()">Save entry</button>
    <button class="mtog" onclick="toggleMgr()">+ Add / manage habits</button>
    <div class="hmgr" id="hmgr">
      <div id="hlist"></div>
      <div class="addsec">
        <div style="font-size:12px;font-weight:600;margin-bottom:8px;">Add new habit</div>
        <div class="arow">
          <input type="text" id="aname" placeholder="Name (e.g. Yoga)">
          <select id="atype" onchange="updateHint()">
            <option value="count">Count (reps / km / min)</option>
            <option value="scale5">Rating 1–5</option>
            <option value="avoid">Avoid (lower = better)</option>
          </select>
        </div>
        <div class="arow" id="atrow">
          <input type="number" id="atgt" placeholder="Daily target" inputmode="numeric" style="max-width:150px;flex:none;">
          <span id="ahint" style="font-size:12px;color:#8e8e93;align-self:center;">e.g. 100</span>
        </div>
        <button class="btn btnp btnw" onclick="doAdd()" style="margin-top:4px;">Add habit</button>
      </div>
    </div>
  </div>
</div>

<!-- popup -->
<div class="poverlay" id="pov" onclick="povClk(event)">
  <div class="popup-box">
    <div class="pd" id="pd"></div>
    <div class="ph" id="ph"></div>
    <div class="pnum" id="pn"></div>
    <div class="punit" id="pu"></div>
    <div class="ppct" id="pp"></div>
    <div class="pbg"><div class="pbf" id="pb"></div></div>
    <div class="pacts">
      <button class="btn" onclick="editDay()">Edit this day</button>
      <button class="btn btnp" onclick="closePop()">Done</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var G=['#e8f5e9','#c8e6c9','#a5d6a7','#81c784','#4caf50','#388e3c','#2e7d32','#1b5e20'];
var AV=['#2e7d32','#c8e6c9','#fff9c4','#ffcc80','#ef9a9a','#c62828'];
var EMPTY_L='#e5e5ea', EMPTY_D='#3a3a3c';

function emptyCol(){return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?EMPTY_D:EMPTY_L;}
function cellColor(val,h){
  if(val===null||val===undefined||val==='')return emptyCol();
  val=+val;
  if(h.type==='avoid')return AV[Math.min(5,Math.max(0,Math.round(val)))];
  if(h.type==='scale5'){if(val<=0)return emptyCol();return[emptyCol(),G[0],G[2],G[4],G[6],G[7]][Math.min(5,Math.max(0,Math.round(val)))];}
  if(val<=0)return emptyCol();
  var p=val/h.target;
  if(p>=1.5)return G[7];if(p>=1.1)return G[6];if(p>=0.9)return G[5];
  if(p>=0.7)return G[4];if(p>=0.5)return G[3];if(p>=0.3)return G[2];
  return G[0];
}

var DEFS=[
  {id:'pushups',name:'Push-ups',type:'count',target:100,unit:'reps'},
  {id:'squats',name:'Squats',type:'count',target:100,unit:'reps'},
  {id:'alcohol',name:'Alcohol',type:'avoid',target:0,unit:'drinks'},
  {id:'running',name:'Running',type:'count',target:3,unit:'km'},
  {id:'cleaneating',name:'Clean Eating',type:'scale5',target:5,unit:'/5'},
  {id:'reading',name:'Reading',type:'count',target:30,unit:'min'},
  {id:'work',name:'Work',type:'scale5',target:5,unit:'/5'},
  {id:'family',name:'Family',type:'scale5',target:5,unit:'/5'},
  {id:'love',name:'Love',type:'scale5',target:5,unit:'/5'},
  {id:'nails',name:'Nails',type:'scale5',target:5,unit:'/5'},
  {id:'stretching',name:'Stretching',type:'scale5',target:5,unit:'/5'}
];

var SK='habits_tracker_v1';
var S={
  habits:DEFS.map(function(h){return JSON.parse(JSON.stringify(h));}),
  data:{},active:'pushups',year:new Date().getFullYear()
};

function persist(){
  try{localStorage.setItem(SK,JSON.stringify(S));return true;}
  catch(e){return false;}
}

function tryLoad(){
  try{
    var r=localStorage.getItem(SK);
    if(!r)return false;
    var p=JSON.parse(r);
    if(!p||!p.data)return false;
    S.data=p.data||{};
    S.active=p.active||'pushups';
    S.year=p.year||new Date().getFullYear();
    if(p.habits){
      p.habits.forEach(function(ph){
        ph.type=ph.type||'count';ph.unit=ph.unit||'';
        if(!S.habits.find(function(h){return h.id===ph.id;}))S.habits.push(ph);
      });
    }
    return true;
  }catch(e){return false;}
}

function getH(id){return S.habits.find(function(h){return h.id===id;});}

function markDirty(){
  var el=document.getElementById('smsg');
  el.textContent='Unsaved changes — tap Save';
  el.className='save-msg';
}
function markClean(){
  var el=document.getElementById('smsg');
  el.textContent='All data saved \u2713';
  el.className='save-msg ok';
}

function doSave(){
  var ok=persist();
  if(ok){markClean();showToast('Saved!');}
  else{showToast('Save failed — try Export instead');}
}

function doExport(){
  var n='habits-backup-'+new Date().toISOString().slice(0,10)+'.json';
  var b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download=n;a.click();
  URL.revokeObjectURL(u);
  showToast('Backup file downloaded!');
}

function doImport(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var p=JSON.parse(e.target.result);
      if(!p||!p.data)throw 0;
      S.data=p.data||{};
      S.active=p.active||'pushups';
      S.year=p.year||new Date().getFullYear();
      if(p.habits){
        p.habits.forEach(function(ph){
          ph.type=ph.type||'count';ph.unit=ph.unit||'';
          if(!S.habits.find(function(h){return h.id===ph.id;}))S.habits.push(ph);
        });
      }
      persist();markClean();render();showToast('Data loaded!');
    }catch(e){showToast('Could not read that file.');}
    ev.target.value='';
  };
  r.readAsText(f);
}

function buildTabs(){
  var el=document.getElementById('tabs');el.innerHTML='';
  S.habits.forEach(function(h){
    var b=document.createElement('button');
    b.className='tab'+(h.id===S.active?' on':'');
    b.textContent=h.name;
    b.onclick=function(){S.active=h.id;render();};
    el.appendChild(b);
  });
  setTimeout(function(){
    var a=el.querySelector('.on'),sc=document.getElementById('tscroll');
    if(a&&sc){
      var tl=a.offsetLeft,tr=tl+a.offsetWidth,sl=sc.scrollLeft,sr=sl+sc.offsetWidth;
      if(tl<sl)sc.scrollLeft=tl-8;
      else if(tr>sr)sc.scrollLeft=tr-sc.offsetWidth+8;
    }
  },20);
}
function shiftTabs(d){document.getElementById('tscroll').scrollBy({left:d*180,behavior:'smooth'});}

function buildBadge(){
  var h=getH(S.active),el=document.getElementById('badge');
  if(!h){el.innerHTML='';return;}
  var col=h.type==='avoid'?'#ef9a9a':h.type==='scale5'?'#4caf50':'#2e7d32';
  var txt=h.type==='avoid'?'Avoid \u2014 lower is better':h.type==='scale5'?'Rating scale 1\u20135':'Target: '+h.target+' '+(h.unit||'');
  el.innerHTML='<span class="bdot" style="background:'+col+'"></span>'+txt;
}

function buildDayCol(){
  var el=document.getElementById('dcol');el.innerHTML='';
  var sp=document.createElement('div');sp.className='dsp';el.appendChild(sp);
  ['','M','','W','','F',''].forEach(function(d,i){
    var row=document.createElement('div');row.className='dlbl';row.textContent=d;el.appendChild(row);
    if(i<6){var g=document.createElement('div');g.className='dgap';el.appendChild(g);}
  });
}

function buildGrid(){
  var year=S.year,h=getH(S.active);
  var hdata=(h&&S.data[S.active])||{};
  var jan1=new Date(year,0,1),offset=jan1.getDay()===0?6:jan1.getDay()-1;
  var grid=document.getElementById('grid');grid.innerHTML='';
  var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],mcols={};
  for(var i=0;i<53*7;i++){
    var cell=document.createElement('div');cell.className='cell';
    var di=i-offset,dd=new Date(year,0,1+di);
    if(di<0||dd.getFullYear()!==year){
      cell.style.background='transparent';cell.style.cursor='default';
    }else{
      var key=dd.toISOString().slice(0,10);
      var raw=hdata[key],val=(raw!==undefined&&raw!==null&&raw!=='')?+raw:null;
      cell.style.background=cellColor(val,h||{type:'count',target:1});
      var col=Math.floor(i/7);
      if(dd.getDate()<=7&&mcols[dd.getMonth()]===undefined)mcols[dd.getMonth()]=col;
      cell.title=key+': '+(val!==null?val+(h&&h.unit?' '+h.unit:''):'nothing logged');
      (function(k,v){cell.addEventListener('click',function(){showPopup(k,v,getH(S.active));});})(key,val);
    }
    grid.appendChild(cell);
  }
  var mr=document.getElementById('mrow');mr.innerHTML='';
  // Use fixed cell size: 11px cell + 2px gap = 13px per column
  // mrow has padding-left:24px to align with grid (past the day labels)
  var CW=13;
  MONTHS.forEach(function(m,idx){
    if(mcols[idx]!==undefined){
      var l=document.createElement('div');l.className='mlbl';
      l.textContent=m;l.style.left=(mcols[idx]*CW)+'px';
      mr.appendChild(l);
    }
  });
}

function buildLegend(){
  var h=getH(S.active),el=document.getElementById('legend');el.innerHTML='';if(!h)return;
  var cols,lL,lR;
  if(h.type==='avoid'){cols=AV;lL='Better';lR='Worse';}
  else if(h.type==='scale5'){cols=[G[0],G[2],G[4],G[6],G[7]];lL='1';lR='5';}
  else{cols=[G[0],G[2],G[4],G[6],G[7]];lL='Less';lR='More';}
  el.innerHTML='<span class="llbl">'+lL+'</span>';
  cols.forEach(function(c){el.innerHTML+='<div class="lcell" style="background:'+c+'"></div>';});
  el.innerHTML+='<span class="llbl">'+lR+'</span>';
}

function buildStats(){
  var h=getH(S.active);if(!h)return;
  var hdata=S.data[S.active]||{},yr=S.year;
  var total=0,days=0,met=0,streak=0;
  Object.keys(hdata).forEach(function(k){
    if(k.slice(0,4)!==''+yr)return;
    var v=+hdata[k];if(isNaN(v))return;
    total+=v;days++;
    if(h.type==='avoid'&&v===0)met++;
    else if(h.type==='scale5'&&v>=5)met++;
    else if(h.type==='count'&&v>=h.target)met++;
  });
  var today=new Date(),td=new Date(today);
  for(var i=0;i<400;i++){
    var k=td.toISOString().slice(0,10);if(k.slice(0,4)!==''+yr)break;
    var v=hdata[k]!==undefined?+hdata[k]:null;
    var ok=v!==null&&(h.type==='avoid'?v===0:h.type==='scale5'?v>=5:v>=h.target);
    if(ok){streak++;td.setDate(td.getDate()-1);}else break;
  }
  var tk=today.toISOString().slice(0,10),tv=hdata[tk]!==undefined&&hdata[tk]!==''?+hdata[tk]:null;
  var tdsp=tv!==null?tv+(h.unit?' '+h.unit:''):'—';
  var tsub=tv===null?'not logged':h.type==='avoid'?(tv===0?'perfect!':tv+' logged'):h.type==='scale5'?'out of 5':Math.round(tv/h.target*100)+'% of target';
  var mlab=h.type==='avoid'?'Zero days':h.type==='scale5'?'Perfect 5s':'Target hit';
  document.getElementById('stats').innerHTML=
    ms('Today',tdsp,tsub)+ms('Streak',streak+'d','days in a row')+ms(mlab,met+'d','this year')+ms('Total',total.toLocaleString(),days+' active days');
}
function ms(l,v,s){return '<div class="stat"><div class="slbl">'+l+'</div><div class="sval">'+v+'</div><div class="ssub">'+s+'</div></div>';}

function buildSelect(){
  var sel=document.getElementById('lhabit');sel.innerHTML='';
  S.habits.forEach(function(h){
    var o=document.createElement('option');o.value=h.id;o.textContent=h.name;
    if(h.id===S.active)o.selected=true;
    sel.appendChild(o);
  });
}
function onSel(){S.active=document.getElementById('lhabit').value;buildBadge();buildStats();buildGrid();buildLegend();buildInputArea();buildTabs();}

var _scale=null;
function buildInputArea(){
  var h=getH(S.active),area=document.getElementById('linput');area.innerHTML='';_scale=null;if(!h)return;
  if(h.type==='scale5'){
    var lbl=document.createElement('div');lbl.className='flbl';lbl.textContent='Rating';lbl.style.marginBottom='7px';area.appendChild(lbl);
    var row=document.createElement('div');row.className='srow';
    var sc=['','#a5d6a7','#81c784','#4caf50','#388e3c','#2e7d32'];
    [1,2,3,4,5].forEach(function(n){
      var b=document.createElement('button');b.className='sbtn';b.textContent=n;
      b.onclick=function(){
        _scale=n;
        document.querySelectorAll('.sbtn').forEach(function(x){x.classList.remove('on');x.style.background='';x.style.color='';});
        b.classList.add('on');b.style.background=sc[n];b.style.color='#fff';
      };
      row.appendChild(b);
    });
    area.appendChild(row);
  }else{
    var lbl2=document.createElement('div');lbl2.className='flbl';
    lbl2.textContent=h.type==='avoid'?('How many '+h.unit+'?'):(h.name+(h.unit?' ('+h.unit+')':''));
    lbl2.style.marginBottom='7px';area.appendChild(lbl2);
    var inp=document.createElement('input');
    inp.id='lval';inp.type='number';inp.min='0';
    inp.placeholder=h.type==='avoid'?'0 = great!':'Target: '+h.target+(h.unit?' '+h.unit:'');
    inp.setAttribute('inputmode','numeric');
    area.appendChild(inp);
  }
}

function doLog(){
  var date=document.getElementById('ldate').value,hid=document.getElementById('lhabit').value,h=getH(hid);
  if(!date||!hid){showToast('Pick a date and habit.');return;}
  var val;
  if(h&&h.type==='scale5'){
    if(_scale===null){showToast('Tap a rating 1\u20135 first.');return;}
    val=_scale;
  }else{
    var inp=document.getElementById('lval');
    if(!inp||inp.value===''){showToast('Enter a number.');return;}
    val=parseFloat(inp.value);
    if(isNaN(val)||val<0){showToast('Enter a valid number.');return;}
  }
  if(!S.data[hid])S.data[hid]={};
  S.data[hid][date]=val;
  markDirty();
  var msg=h.type==='avoid'?(val===0?'Logged 0 \u2014 great!':'Logged '+val+' '+h.unit):
          h.type==='scale5'?('Rated '+val+'/5 for '+h.name):
          ('Saved '+val+(h.unit?' '+h.unit:'')+' \u2014 '+Math.round(val/h.target*100)+'%');
  showToast(msg);
  _scale=null;
  var lv=document.getElementById('lval');if(lv)lv.value='';
  document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('on');b.style.background='';b.style.color='';});
  render();
}

function buildHList(){
  var el=document.getElementById('hlist');el.innerHTML='';
  S.habits.forEach(function(h){
    var row=document.createElement('div');row.className='hrow';
    var nm=document.createElement('span');nm.className='hname';nm.textContent=h.name;
    var tl=document.createElement('span');tl.className='tlbl';tl.textContent=h.type==='avoid'?'Avoid':h.type==='scale5'?'1\u20135':'Count';
    var dl=document.createElement('button');dl.className='bdel';dl.textContent='Remove';
    dl.onclick=(function(id){return function(){delHabit(id);};})(h.id);
    row.appendChild(nm);row.appendChild(tl);row.appendChild(dl);el.appendChild(row);
  });
}
function toggleMgr(){
  var el=document.getElementById('hmgr'),op=!el.classList.contains('open');
  el.classList.toggle('open');if(op){buildHList();updateHint();}
}
function updateHint(){
  var t=document.getElementById('atype');if(!t)return;
  document.getElementById('atrow').style.display=t.value==='scale5'?'none':'flex';
}
function doAdd(){
  var name=document.getElementById('aname').value.trim(),type=document.getElementById('atype').value;
  var tgt=type==='scale5'?5:parseInt(document.getElementById('atgt').value)||0;
  if(!name){showToast('Enter a habit name.');return;}
  if(type!=='scale5'&&tgt<=0){showToast('Enter a target number.');return;}
  var id=name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now();
  S.habits.push({id:id,name:name,type:type,target:tgt,unit:''});
  S.active=id;
  document.getElementById('aname').value='';document.getElementById('atgt').value='';
  markDirty();render();buildHList();showToast('"'+name+'" added!');
}
function delHabit(id){
  if(S.habits.length<=1){showToast('Keep at least one habit.');return;}
  if(!confirm('Remove "'+(getH(id)||{name:id}).name+'" and all its data?'))return;
  S.habits=S.habits.filter(function(h){return h.id!==id;});
  delete S.data[id];
  if(S.active===id)S.active=S.habits[0].id;
  markDirty();render();
}
function changeYear(d){S.year+=d;render();}

var _pkey=null;
function showPopup(key,val,h){
  _pkey=key;
  document.getElementById('pd').textContent=new Date(key+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  document.getElementById('ph').textContent=h?h.name:'';
  document.getElementById('pn').textContent=val!==null?val:'—';
  document.getElementById('pn').style.color=val!==null?cellColor(val,h||{type:'count',target:1}):'#8e8e93';
  document.getElementById('pu').textContent=h&&h.unit&&val!==null?h.unit:'';
  var pt=val===null?'Nothing logged yet':h.type==='avoid'?(val===0?'Perfect \u2014 none logged':val+' logged (aim for 0)'):h.type==='scale5'?('Rated '+val+' out of 5'):(Math.round(val/h.target*100)+'% of '+h.target+(h.unit?' '+h.unit:'')+' target');
  document.getElementById('pp').textContent=pt;
  var bp=val===null?0:h.type==='avoid'?(val===0?100:Math.max(0,100-val*25)):h.type==='scale5'?val/5*100:Math.min(val/h.target*100,100);
  document.getElementById('pb').style.width=bp+'%';
  document.getElementById('pb').style.background=val!==null?cellColor(val,h||{type:'count',target:1}):'#e5e5ea';
  document.getElementById('pov').classList.add('open');
}
function closePop(){document.getElementById('pov').classList.remove('open');}
function povClk(e){if(e.target===document.getElementById('pov'))closePop();}
function editDay(){
  closePop();
  if(_pkey){
    document.getElementById('ldate').value=_pkey;
    document.getElementById('lhabit').value=S.active;
    setTimeout(function(){document.getElementById('linput').scrollIntoView({behavior:'smooth',block:'center'});},80);
  }
}

var _tt;
function showToast(msg){
  var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(function(){el.classList.remove('show');},3000);
}

function render(){
  document.getElementById('yd').textContent=S.year;
  buildTabs();buildBadge();buildStats();buildDayCol();buildGrid();buildLegend();
  buildSelect();buildInputArea();
  if(document.getElementById('hmgr').classList.contains('open'))buildHList();
}

document.getElementById('ldate').value=new Date().toISOString().slice(0,10);
var loaded=tryLoad();
if(loaded)markClean();
render();
</script>
